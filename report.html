              tables.forEach(table => {
                  table.style.tableLayout = 'fixed';
                  
                  // 1. 열(Width) 리사이즈 구현
                  const headers = table.querySelectorAll('th');
                  headers.forEach((header) => {
                      header.style.position = 'relative';
                      
                      const resizer = document.createElement('div');
                      resizer.style.width = '6px';
                      resizer.style.height = '100%';
                      resizer.style.position = 'absolute';
                      resizer.style.right = '0';
                      resizer.style.top = '0';
                      resizer.style.cursor = 'col-resize';
                      resizer.style.userSelect = 'none';
                      resizer.style.zIndex = '10';
                      resizer.className = 'hover:bg-indigo-500/50 transition-colors';
                      
                      header.appendChild(resizer);
                      
                      let startX, startWidth;
                      
                      resizer.addEventListener('mousedown', function(e) {
                          startX = e.pageX;
                          startWidth = header.offsetWidth;
                          
                          function onMouseMove(e) {
                              const width = startWidth + (e.pageX - startX);
                              header.style.width = Math.max(50, width) + 'px';
                          }
                          
                          function onMouseUp() {
                              document.removeEventListener('mousemove', onMouseMove);
                              document.removeEventListener('mouseup', onMouseUp);
                          }
                          
                          document.addEventListener('mousemove', onMouseMove);
                          document.addEventListener('mouseup', onMouseUp);
                          e.preventDefault();
                      });
                  });
                  
                  // 2. 행(Height) 리사이즈 구현
                  const rows = table.querySelectorAll('tr');
                  rows.forEach((row) => {
                      row.style.position = 'relative';
                      
                      const firstCell = row.cells[0];
                      if (!firstCell) return;
                      firstCell.style.position = 'relative';
                      
                      const resizer = document.createElement('div');
                      resizer.style.width = '100%';
                      resizer.style.height = '6px';
                      resizer.style.position = 'absolute';
                      resizer.style.left = '0';
                      resizer.style.bottom = '0';
                      resizer.style.cursor = 'row-resize';
                      resizer.style.userSelect = 'none';
                      resizer.style.zIndex = '10';
                      resizer.className = 'hover:bg-indigo-500/50 transition-colors';
                      
                      firstCell.appendChild(resizer);
                      
                      let startY, startHeight;
                      
                      resizer.addEventListener('mousedown', function(e) {
                          startY = e.pageY;
                          startHeight = row.offsetHeight;
                          
                          function onMouseMove(e) {
                              const height = startHeight + (e.pageY - startY);
                              const newHeight = Math.max(30, height) + 'px';
                              row.style.height = newHeight;
                              Array.from(row.cells).forEach(cell => {
                                  cell.style.height = newHeight;
                              });
                          }
                          
                          function onMouseUp() {
                              document.removeEventListener('mousemove', onMouseMove);
                              document.removeEventListener('mouseup', onMouseUp);
                          }
                          
                          document.addEventListener('mousemove', onMouseMove);
                          document.addEventListener('mouseup', onMouseUp);
                          e.preventDefault();
                      });
                  });
              });
          }
      </script>
  </body>
  </html>
